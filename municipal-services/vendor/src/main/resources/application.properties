server.context-path=/vendor
server.servlet.context-path=/vendor

server.port=8086
app.timezone=UTC
#spring.main.allow-bean-definition-overriding: true

spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root

spring.datasource.platform=postgresql

##----------------------------- FLYWAY CONFIGURATIONS -----------------------------#
spring.flyway.url=jdbc:postgresql://localhost:5432/postgres
spring.flyway.user=postgres
spring.flyway.password=root
spring.flyway.table=public_vendor
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/main
spring.flyway.enabled=true

# KAFKA SERVER CONFIGURATIONS
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=egov-vendor-services
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.listener.missing-topics-fatal=false

# KAFKA CONSUMER CONFIGURATIONS
kafka.consumer.config.auto_commit=true
kafka.consumer.config.auto_commit_interval=100
kafka.consumer.config.session_timeout=15000
kafka.consumer.config.auto_offset_reset=earliest
# KAFKA PRODUCER CONFIGURATIONS
kafka.producer.config.retries_config=0
kafka.producer.config.batch_size_config=16384
kafka.producer.config.linger_ms_config=1
kafka.producer.config.buffer_memory_config=33554432
#org.egov.detailed.tracing.enabled = false

#persister configs — Vendor
persister.save.vendor.topic=save-vendor-application
persister.update.vendor.topic=update-vendor-application

#persister configs — Driver
persister.save.driver.topic=save-driver-application
persister.update.driver.topic=update-driver-application
persister.save.vendordrivervehicle.topic=save-vendordrivervehicle-application

#persister configs — Supervisor
persister.save.supervisor.topic=save-supervisor-application
persister.update.supervisor.topic=update-supervisor-application

#persister configs — Surveyor
persister.save.surveyor.topic=save-surveyor-application
persister.update.surveyor.topic=update-surveyor-application

#persister configs — Team Mapping
persister.save.team.mapping.topic=save-team-mapping
persister.update.team.mapping.topic=update-team-mapping

