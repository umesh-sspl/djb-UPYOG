          basePath: supervisor
          jsonMaps:
            - jsonPath: $.supervisor.id
            - jsonPath: $.supervisor.name
            - jsonPath: $.supervisor.tenantId
            - jsonPath: $.supervisor.vendorId
            - jsonPath: $.supervisor.mobileNo
            - jsonPath: $.supervisor.assignedZoneId
            - jsonPath: $.supervisor.additionalDetails
              type: JSON
              dbType: JSONB
            - jsonPath: $.supervisor.ownerId
            - jsonPath: $.supervisor.description
            - jsonPath: $.supervisor.status
            - jsonPath: $.supervisor.auditDetails.createdBy
            - jsonPath: $.supervisor.auditDetails.lastModifiedBy
            - jsonPath: $.supervisor.auditDetails.createdTime
            - jsonPath: $.supervisor.auditDetails.lastModifiedTime

    # ============================================================
    # SUPERVISOR — UPDATE
    # ============================================================
    - version: 1.0
      description: Update Supervisor in eg_supervisor table
      fromTopic: update-supervisor-application
      isTransaction: true
      queryMaps:

        - query: UPDATE eg_supervisor SET name=?, vendor_id=?, mobile_no=?, assigned_zone_id=?, additionaldetails=?, owner_id=?, description=?, status=?, lastmodifiedby=?, lastmodifiedtime=? WHERE id=? AND tenantid=?;
          basePath: supervisor
          jsonMaps:
            - jsonPath: $.supervisor.name
            - jsonPath: $.supervisor.vendorId
            - jsonPath: $.supervisor.mobileNo
            - jsonPath: $.supervisor.assignedZoneId
            - jsonPath: $.supervisor.additionalDetails
              type: JSON
              dbType: JSONB
            - jsonPath: $.supervisor.ownerId
            - jsonPath: $.supervisor.description
            - jsonPath: $.supervisor.status
            - jsonPath: $.supervisor.auditDetails.lastModifiedBy
            - jsonPath: $.supervisor.auditDetails.lastModifiedTime
            - jsonPath: $.supervisor.id
            - jsonPath: $.supervisor.tenantId

    # ============================================================
    # SURVEYOR — CREATE
    # ============================================================
    - version: 1.0
      description: Save Surveyor in eg_surveyor table
      fromTopic: save-surveyor-application
      isTransaction: true
      queryMaps:

        - query: INSERT INTO eg_surveyor(id, name, tenantid, vendor_id, mobile_no, supervisor_id, additionaldetails, owner_id, description, status, createdby, lastmodifiedby, createdtime, lastmodifiedtime) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?);
          basePath: surveyor
          jsonMaps:
            - jsonPath: $.surveyor.id
            - jsonPath: $.surveyor.name
            - jsonPath: $.surveyor.tenantId
            - jsonPath: $.surveyor.vendorId
            - jsonPath: $.surveyor.mobileNo
            - jsonPath: $.surveyor.supervisorId
            - jsonPath: $.surveyor.additionalDetails
              type: JSON
              dbType: JSONB
            - jsonPath: $.surveyor.ownerId
            - jsonPath: $.surveyor.description
            - jsonPath: $.surveyor.status
            - jsonPath: $.surveyor.auditDetails.createdBy
            - jsonPath: $.surveyor.auditDetails.lastModifiedBy
            - jsonPath: $.surveyor.auditDetails.createdTime
            - jsonPath: $.surveyor.auditDetails.lastModifiedTime

    # ============================================================
    # SURVEYOR — UPDATE
    # ============================================================
    - version: 1.0
      description: Update Surveyor in eg_surveyor table
      fromTopic: update-surveyor-application
      isTransaction: true
      queryMaps:

        - query: UPDATE eg_surveyor SET name=?, vendor_id=?, mobile_no=?, supervisor_id=?, additionaldetails=?, owner_id=?, description=?, status=?, lastmodifiedby=?, lastmodifiedtime=? WHERE id=? AND tenantid=?;
          basePath: surveyor
          jsonMaps:
            - jsonPath: $.surveyor.name
            - jsonPath: $.surveyor.vendorId
            - jsonPath: $.surveyor.mobileNo
            - jsonPath: $.surveyor.supervisorId
            - jsonPath: $.surveyor.additionalDetails
              type: JSON
              dbType: JSONB
            - jsonPath: $.surveyor.ownerId
            - jsonPath: $.surveyor.description
            - jsonPath: $.surveyor.status
            - jsonPath: $.surveyor.auditDetails.lastModifiedBy
            - jsonPath: $.surveyor.auditDetails.lastModifiedTime
            - jsonPath: $.surveyor.id
            - jsonPath: $.surveyor.tenantId
